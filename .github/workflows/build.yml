name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore ClickLockNotifier.sln

      - name: Build
        run: dotnet build ClickLockNotifier.sln --configuration Release --no-restore

      - name: Publish
        shell: pwsh
        run: ./scripts/publish.ps1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClickLockNotifier-win-x64
          path: dist/win-x64/**
